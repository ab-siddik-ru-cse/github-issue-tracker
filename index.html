<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        #priorityBtn-high {
            background-color: #FEECEC;
            color: #EF4444;
        }

        #priorityBtn-low {
            background-color: #EEEFF2;
            color: #9CA3AF;
        }

        #priorityBtn-medium {
            background-color: #FFF6D1;
            color: #F59E0B;
            padding: 4px 20px;
        }

        .active {
            background-color: blue;
            color: white;
        }

        #border-open {
            border-top: 4px solid #00A96E;
        }

        #border-closed {
            border-top: 4px solid #A855F7;
        }
    </style>
</head>

<body class="bg-[#E9E9E9]">
    <section id="login-page" class="max-w-[520px] mx-auto my-10 sm:my-20 rounded-lg shadow-lg bg-white p-8">
        <div class="flex flex-col items-center">
            <img class="mb-6" src="assets/github-logo.png" alt="">
            <h1 class="font-bold text-xl mb-1.5">GitHub Issues Tracker</h1>
            <p class="text-sm font-medium text-gray-500">Sign in to manage your issues</p>
        </div>
        <div>
            <div class="space-y-3 ">
                <div>
                    <label for="username" class="block text-sm/6 font-medium text-gray-700">Username</label>
                    <div class="mt-2">
                        <input id="inputUsername" type="text" name="user" required autocomplete="username"
                            placeholder="Enter user name"
                            class="block w-full rounded-md  px-3 py-3 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    </div>
                    <p class="text-sm font-medium text-indigo-600 mt-2">Default : admin</p>
                </div>

                <div>
                    <div class="mt-2">
                        <label for="password" class="block text-sm/6 font-medium text-gray-700">Password</label>
                        <input id="inputPassword" type="password" name="password" required
                            autocomplete="current-password" placeholder="Enter password"
                            class="block w-full rounded-md  px-3 py-3 tex outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    </div>
                    <p class="text-sm font-medium text-indigo-600 mt-2">Default : admin123</p>
                </div>

                <div>
                    <button id="loginBtn" type="submit"
                        class="flex w-full justify-center rounded-md bg-[#4A00FF] px-3 py-3 text-sm/6 font-semibold text-white hover:bg-indigo-700 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-700 cursor-pointer transition-colors">Sign
                        in</button>
                </div>
            </div>
        </div>
        <div class="flex items-center justify-center my-5">
            <div class="flex-grow border-t-1 border-gray-300"></div>
            <span class="flex-shrink mx-4 text-gray-600 font-semibold">OR</span>
            <div class="flex-grow border-t-1 border-gray-300"></div>
        </div>
        <div class="mx-auto">
            <p id="login-error" class="text-red-700 text-center mb-3 hidden">Incorrect username or password!</p>
            <p class="text-gray-500 text-center mb-3">Demo Credentials:</p>
            <div class="bg-gray-100 p-5 rounded-lg text-center">
                <h2 class="font-bold text-black">Username : <span class="font-semibold text-gray-500">admin</span></h2>
                <h2 class="font-bold text-black">Password : <span class="font-semibold text-gray-500">admin123</span>
                </h2>
            </div>
        </div>

    </section>

    <div id="home-page" class="bg-[#E9E9E9] hidden">
        <nav
            class="max-w-[1300px] mx-auto rounded-lg flex flex-col sm:flex-row gap-4 sm:gap-0 justify-between items-center w-full sm:px-10 py-4 sm:py-5 bg-[#F8FAFC] border-b-2 border-gray-300">
            <div class="flex items-center gap-2 justify-center">
                <img class="w-8" src="assets/github-logo.png" alt="">
                <h1 class="font-bold sm:text-xl">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-3">
                <input id="search" type="text" name="search" placeholder="🔍 Search issues..." class="block rounded-sm pl-3  sm:pl-5 pr-2 sm:pr-10 py-2 outline-1 -outline-offset-1
                 outline-gray-300 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2
                  focus:outline-indigo-500 sm:text-sm/6" />
                <div>
                    <button onclick="getSearchInfo()" id="search"
                        class="flex-shrink-0 flex justify-center rounded-sm bg-[#4A00FF] px-5 py-2 text-sm/6 font-semibold text-white hover:bg-indigo-700 cursor-pointer transition-colors">Search
                        Issue</button>
                </div>
            </div>
        </nav>

        <section
            class="flex max-w-[1300px] mx-auto flex-wrap gap-2 sm:gap-4 justify-start bg-[#F8FAFC] p-4 sm:p-6 mt-6 sm:mt-10 rounded-lg shadow-sm">
            <button onclick="getBtnCategory('all')"
                class="flex justify-center border border-gray-300 btn-category btn-category-all active rounded-sm px-12 py-2 text-sm/6 font-semibold text-gray-500 cursor-pointer transition-colors">All</button>
            <button onclick="getBtnCategory('open')"
                class="flex justify-center border border-gray-300 btn-category btn-category-open rounded-sm px-10 py-2 text-sm/6 font-semibold text-gray-500 cursor-pointer transition-colors">Open</button>
            <button onclick="getBtnCategory('closed')"
                class="flex justify-center border border-gray-300 btn-category btn-category-closed rounded-sm px-10 py-2 text-sm/6 font-semibold text-gray-500 cursor-pointer transition-colors">Closed</button>
        </section>
        <section
            class="max-w-[1300px] mx-auto flex flex-col items-start justify-start sm:flex-row sm:justify-between sm:items-center p-6 mt-6 rounded-lg shadow-sm bg-[#F8FAFC] border-b-2 border-b-gray-300 gap-4 sm:gap-0">
            <div class="flex items-center gap-2 justify-center">
                <div class="bg-[#ECE4FF] p-3 rounded-full">
                    <img class="w-10" src="assets/Aperture.png" alt="">
                </div>
                <div class="space-y-2">
                    <h1 class="font-bold text-xl"><span id="totalIssues">0</span> Issues</h1>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>

            </div>
            <div class="flex gap-3">
                <div>
                    <p class="font-medium"><i class="fa-solid fa-circle text-sm text-green-600"> </i> Open</p>
                </div>
                <div>
                    <p class="font-medium"><i class="fa-solid fa-circle text-sm text-[#A855F7]"> </i> Closed</p>
                </div>
            </div>
        </section>
        <section id="issuesContainer"
            class="bg-[#FBFBFB] gap-4 max-w-[1300px] mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 py-6 rounded-lg">

        </section>

    </div>
    <script src="scripts/script.js"></script>
</body>

</html>
